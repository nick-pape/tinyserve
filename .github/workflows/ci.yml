name: CI

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:
    inputs:
      run_gpu_tests:
        description: "Run GPU tests on self-hosted runner"
        type: boolean
        default: false

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff mypy
      - name: Ruff lint
        run: ruff check tinyserve/ scripts/ tests/
      - name: Ruff format check
        run: ruff format --check tinyserve/ scripts/ tests/
      - name: Mypy type check (public API)
        run: mypy tinyserve/__init__.py tinyserve/offload.py tinyserve/static_kv_cache.py tinyserve/expert_cache.py --ignore-missing-imports --no-error-summary || true

  test-cpu:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: pip install -e ".[dev]"
      - run: pytest tests/ -v -m "not requires_cuda" --tb=short

  test-gpu:
    if: >-
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.run_gpu_tests == 'true'
    runs-on: self-hosted
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: pip install -e ".[dev]"
      - run: pytest tests/ -v --tb=short
